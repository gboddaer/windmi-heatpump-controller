name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake doxygen

    - name: Configure build
      run: |
        mkdir build
        cd build
        cmake -DWINDMI_BUILD_TESTS=ON ..

    - name: Build project
      run: |
        cd build
        make -j$(nproc)

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure
        ./tests/utils/test_utils --gtest_filter=LoggerTest.* || true

    - name: Build documentation
      if: false
      run: |
        sudo apt-get install -y doxygen
        cd build
        make docs

  build-mingw:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install MinGW-w64
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-mingw-w64-x86-64-posix gcc-mingw-w64-x86-64-posix cmake

    - name: Configure
      run: |
        mkdir build-win64
        cd build-win64
        cmake .. -G "Unix Makefiles" \
          -DCMAKE_TOOLCHAIN_FILE=../mingw-w64-x86_64.cmake \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build-win64
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windmi-control-windows
        path: build-win64/windmi-control.exe
        retention-days: 7

  build-msvc:
    # Pin to windows-2022: windows-latest migrated to VS 2026 (Jun 2026)
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Configure MSVC
      run: cmake -S . -B build-msvc -G "Visual Studio 17 2022" -DWINDMI_BUILD_TESTS=ON

    - name: Build MSVC
      run: cmake --build build-msvc --config Release

    - name: Test MSVC
      run: ctest --test-dir build-msvc -C Release --output-on-failure

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy

    - name: Run clang-tidy
      run: |
        mkdir -p build
        cmake -B build -S .
        cmake --build build -j$(nproc)
        clang-tidy build/src/*.cpp build/tests/*/*.cpp -p=build -header-filter='include/*' 2>&1 || true

    - name: Shellcheck
      run: |
        find . -name "*.sh" -exec shellcheck {} + || true
