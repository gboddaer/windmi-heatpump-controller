name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake doxygen

    - name: Configure build
      run: |
        mkdir build
        cd build
        cmake -DWINDMI_BUILD_TESTS=ON ..

    - name: Build project
      run: |
        cd build
        make -j$(nproc)

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure
        ./tests/utils/test_utils --gtest_filter=LoggerTest.* || true

    - name: Build documentation
      if: false  # Enable when Doxygen is configured
      run: |
        sudo apt-get install -y doxygen
        cd build
        make docs

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy

    - name: Run clang-tidy
      run: |
        mkdir -p build
        cmake -B build -S .
        cmake --build build -j$(nproc)
        clang-tidy build/src/*.cpp build/tests/*/*.cpp -p=build -header-filter='include/*' 2>&1 || true

    - name: Shellcheck
      run: |
        find . -name "*.sh" -exec shellcheck {} + || true
