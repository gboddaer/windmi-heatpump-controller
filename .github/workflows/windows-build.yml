name: Windows Build

on:
  push:
    branches:
      - feature/windows-support
      - main
  pull_request:
    branches:
      - main

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.20'

      - name: Setup vcpkg
        uses: lukka/setup-vcpkg@v11
        with:
          version: '2023.04.15'

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install gtest:x64-windows
        shell: pwsh

      - name: Configure
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build
        run: |
          cmake --build build --config Release
        shell: pwsh

      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windmi-control-windows
          path: build/Release/windmi-control.exe
          retention-days: 7
