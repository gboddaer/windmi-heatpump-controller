<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windmi Heat Pump Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Windmi Heat Pump</h1>
            <div class="status-bar">
                <span id="deviceStatus" class="status-indicator offline">Offline</span>
                <button id="powerBtn" class="power-btn off">OFF</button>
            </div>
        </header>

        <main>
            <section class="status-card">
                <h2>Current Status</h2>
                <div class="status-row status-row-main">
                    <div class="status-item"><span class="label">Mode</span> <span id="modeValue" class="value">-</span></div>
                    <div class="status-item"><span class="label">Status</span> <span id="runStatus" class="value">-</span></div>
                    <div class="status-item"><span class="label">Priority</span> <span id="priorityValue" class="value">-</span></div>
                    <div class="status-item"><span class="label">Outdoor</span> <span id="outdoorTempValue" class="value">-</span></div>
                </div>
            </section>

            <section class="temps-card">
                <h2>Temperatures</h2>
                <div class="temp-grid">
                    <div class="temp-item">
                        <span class="label">DHW Tank</span>
                        <span id="dhwTempValue" class="value">-</span>
                    </div>
                    <div class="temp-item">
                        <span class="label">Heating (LWT)</span>
                        <span id="heatingTempValue" class="value">-</span>
                    </div>

                </div>
            </section>

            <section class="status-card">
                <h2>Diagnostics</h2>
                <div class="temp-grid">
                    <div class="temp-item">
                        <span class="label">DHW Valve</span>
                        <span id="dhwValveValue" class="value">-</span>
                    </div>
                    <div class="temp-item">
                        <span class="label">Capacity Output</span>
                        <span id="actualCapacityValue" class="value">-</span>
                    </div>
                </div>
            </section>

            <section class="controls-card">
                <h2>Controls</h2>
                
                <div class="control-group">
                    <label for="dhwSlider">DHW Temperature (°C)</label>
                    <div class="slider-container">
                        <input type="range" id="dhwSlider" min="40" max="63" step="0.5" value="50">
                        <input type="number" id="dhwInput" min="40" max="63" step="0.5" value="50">
                    </div>
                    <button id="setDhwBtn" class="btn">Set DHW</button>
                </div>

                <div class="control-group">
                    <label for="heatingSlider">Heating Temperature (°C)</label>
                    <div class="slider-container">
                        <input type="range" id="heatingSlider" min="25" max="63" step="0.5" value="40">
                        <input type="number" id="heatingInput" min="25" max="63" step="0.5" value="40">
                    </div>
                    <button id="setHeatingBtn" class="btn">Set Heating</button>
                </div>

                <div class="control-group mode-group">
                    <label>Working Mode</label>
                    <div class="mode-selector">
                        <button id="modeOffBtn" class="mode-btn">OFF</button>
                        <button id="modeDhwBtn" class="mode-btn">DHW Only</button>
                        <button id="modeHeatBtn" class="mode-btn">Heating Only</button>
                        <button id="modeBothBtn" class="mode-btn active">DHW + Heating</button>
                    </div>
                </div>
                
                <div class="control-group priority-group" id="prioritySection">
                    <label>Priority (when both enabled)</label>
                    <div class="toggle-container">
                        <button id="dhwPriorityBtn" class="toggle-btn active">DHW</button>
                        <button id="heatingPriorityBtn" class="toggle-btn">Heating</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Auto-refresh: <span id="refreshCountdown">5</span>s</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
