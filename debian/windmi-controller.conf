# Windmi Controller configuration
# See 'windmi-control --help' for all options.

# Modbus gateway IP address
# WINDMI_MODBUS_IP=192.168.123.10

# Modbus gateway port
# WINDMI_MODBUS_PORT=8899

# Web server HTTP port
# WINDMI_WEB_PORT=8080

# Log level: TRACE, DEBUG, INFO, WARN, ERROR, FATAL
WINDMI_LOG_LEVEL=INFO

# Optional log file path (empty = console only)
# WINDMI_LOG_FILE=/var/log/windmi-controller.log

# Run in demo mode (simulated device)
# WINDMI_DEMO=false
